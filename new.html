<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico?v=1">
  <title>새 컬러 등록하기 - MBTI별 좋아하는 컬러</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="new.css">
</head>
<body>
  <div class="container">
    <div class="header-container">
      <div class="header">
        <span>새 컬러 등록하기</span>
        <div class="header-img">
          <a href="index.html"><img src="images/x.svg" alt="창 닫기 아이콘"></a>
        </div>
      </div>
    </div>
    <div class="main-container">
      <section>
        <div class="mbti-container">
          <div class="mbti-header">
            <span>MBTI</span>
          </div>
          <div class="mbtis">
            <div class="mbti e">
              <div class="mbti-type-eng">E</div>
              <div class="mbti-type-kor">외향형</div>
            </div>
            <div class="mbti i">
              <div class="mbti-type-eng">I</div>
              <div class="mbti-type-kor">내향형</div>
            </div>
            <div class="mbti s">
              <div class="mbti-type-eng">S</div>
              <div class="mbti-type-kor">감각형</div>
            </div>
            <div class="mbti n">
              <div class="mbti-type-eng">N</div>
              <div class="mbti-type-kor">직관형</div>
            </div>
            <div class="mbti t">
              <div class="mbti-type-eng">T</div>
              <div class="mbti-type-kor">사고형</div>
            </div>
            <div class="mbti f">
              <div class="mbti-type-eng">F</div>
              <div class="mbti-type-kor">감정형</div>
            </div>
            <div class="mbti j">
              <div class="mbti-type-eng">J</div>
              <div class="mbti-type-kor">판단형</div>
            </div>
            <div class="mbti p">
              <div class="mbti-type-eng">P</div>
              <div class="mbti-type-kor">인식형</div>
            </div>
          </div>
        </div>
        <div class="color-container">
          <div class="color-header">
            <span>컬러</span>
            <div class="color-header-img">
              <img src="images/repeat.svg" alt="다시하기 아이콘">
            </div>
          </div>
          <div class="color-input">
            <div class="color-input-container">
              <input id="color-input" type="text" placeholder="#9441FF">
              <div class="color-preview"></div>
            </div>
            <input id="color-submit" type="submit" value="컬러 등록">
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
